name: CI

on:
  push:
    branches: [main]
    paths:
      - '**/*.yaml'
      - '**/*.yml'
      - 'kustomize/**'
      - 'helm/**'
      - 'docker/scripts/**'
      - 'tests/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  yaml-lint:
    name: yamllint
    # Skip while PR is in Draft to avoid wasting minutes on work-in-progress.
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install yamllint
        run: |
          set -euo pipefail
          python3 -m pip install --user --no-cache-dir 'yamllint==1.35.1'
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run yamllint
        run: |
          set -euo pipefail
          yamllint --version
          # `relaxed` baseline; line-length disabled (K8s manifests routinely
          # exceed 80 cols), `truthy` and `comments-indentation` downgraded so
          # GitHub Actions syntax (`on:` etc.) does not fail the build.
          yamllint -f github -d "{extends: relaxed, rules: {line-length: disable, document-start: disable, comments-indentation: disable, truthy: {level: warning, check-keys: false}}}" .github/ kustomize/

  kustomize-validate:
    name: kustomize build + kubeconform
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    env:
      KUSTOMIZE_VERSION: '5.8.1'
      KUBECONFORM_VERSION: '0.7.0'
      # Pin the schema target so a runner-image bump cannot silently change
      # what counts as valid. Update intentionally alongside cluster upgrades.
      KUBERNETES_VERSION: '1.31.0'
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install kustomize
        run: |
          set -euo pipefail
          # Extract into a scratch directory to avoid collision with the
          # repo's own kustomize/ directory at the workspace root.
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          curl -fsSL -o "$tmp/kustomize.tar.gz" \
            "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize/v${KUSTOMIZE_VERSION}/kustomize_v${KUSTOMIZE_VERSION}_linux_amd64.tar.gz"
          tar -xzf "$tmp/kustomize.tar.gz" -C "$tmp"
          sudo install -m 0755 "$tmp/kustomize" /usr/local/bin/kustomize
          kustomize version

      - name: Install kubeconform
        run: |
          set -euo pipefail
          # Extract into a scratch directory to keep the workspace pristine
          # (the kubeconform tarball ships a LICENSE file that would otherwise
          # overwrite the repo's own LICENSE).
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          curl -fsSL -o "$tmp/kubeconform.tar.gz" \
            "https://github.com/yannh/kubeconform/releases/download/v${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz"
          tar -xzf "$tmp/kubeconform.tar.gz" -C "$tmp"
          sudo install -m 0755 "$tmp/kubeconform" /usr/local/bin/kubeconform
          kubeconform -v

      - name: Build and validate every overlay
        run: |
          set -euo pipefail
          shopt -s nullglob

          overlays=(kustomize/overlays/*/)
          if [ "${#overlays[@]}" -eq 0 ]; then
            echo "::error::no overlays found under kustomize/overlays/"
            exit 1
          fi

          status=0
          for overlay in "${overlays[@]}"; do
            overlay="${overlay%/}"
            echo "::group::${overlay}"
            if ! kustomize build "${overlay}" \
              | kubeconform \
                  -strict \
                  -ignore-missing-schemas \
                  -kubernetes-version "${KUBERNETES_VERSION}" \
                  -schema-location default \
                  -summary \
                  -output text; then
              echo "::error file=${overlay}/kustomization.yaml::kubeconform validation failed for ${overlay}"
              status=1
            fi
            echo "::endgroup::"
          done
          exit "${status}"

  helm-validate:
    name: helm lint + template
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    env:
      HELM_VERSION: '3.16.4'
      KUBECONFORM_VERSION: '0.7.0'
      # Pin the schema target so a runner-image bump cannot silently change
      # what counts as valid. Keep in sync with kustomize-validate above.
      KUBERNETES_VERSION: '1.31.0'
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install helm
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          curl -fsSL -o "$tmp/helm.tar.gz" \
            "https://get.helm.sh/helm-v${HELM_VERSION}-linux-amd64.tar.gz"
          tar -xzf "$tmp/helm.tar.gz" -C "$tmp"
          sudo install -m 0755 "$tmp/linux-amd64/helm" /usr/local/bin/helm
          helm version

      - name: Install kubeconform
        run: |
          set -euo pipefail
          # Extract into a scratch directory to keep the workspace pristine
          # (the kubeconform tarball ships a LICENSE file that would otherwise
          # overwrite the repo's own LICENSE).
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          curl -fsSL -o "$tmp/kubeconform.tar.gz" \
            "https://github.com/yannh/kubeconform/releases/download/v${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz"
          tar -xzf "$tmp/kubeconform.tar.gz" -C "$tmp"
          sudo install -m 0755 "$tmp/kubeconform" /usr/local/bin/kubeconform
          kubeconform -v

      - name: Lint and render the chart
        run: |
          set -euo pipefail

          chart=helm/octo
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT

          # Dummy secrets so `required` gates pass — these are CI-only throwaway
          # placeholders, NOT real credentials. The chart only enforces non-empty
          # (the 32-hex master-key length is a runtime, not template-time, rule),
          # so low-entropy placeholders keep the secret scanner quiet.
          dummy_secrets=(
            --set secrets.mysqlRootPassword=ci-dummy
            --set secrets.minioRootPassword=ci-dummy-pass
            --set secrets.minioAppPassword=ci-dummy
            --set secrets.matterDbPassword=ci-dummy
            --set secrets.summaryDbPassword=ci-dummy
            --set secrets.summaryReaderPassword=ci-dummy
            --set secrets.octoMasterKey=ci-dummy-master-key
            --set secrets.notifyInternalToken=ci-dummy
            --set secrets.wukongimManagerToken=ci-dummy
          )

          echo "::group::helm lint"
          helm lint "${chart}" "${dummy_secrets[@]}"
          echo "::endgroup::"

          # The five search templates that must render when search.enabled=true
          # and must NOT render when search.enabled=false (default-off contract).
          search_sources=(
            search-opensearch
            search-kafka
            search-kafka-init
            es-indexer
            searchetl-producer
          )

          # Count rendered docs originating from a given template. Reads a file
          # (not a pipe) so `grep -c` cannot SIGPIPE an upstream producer under
          # `set -o pipefail` and report a false zero.
          count_source() {
            grep -cE "^# Source: octo/templates/${1}\.yaml$" "$2" || true
          }

          validate() {
            # Render must be valid Kubernetes. -ignore-missing-schemas tolerates
            # CRDs/hooks without published schemas, matching kustomize-validate.
            kubeconform \
              -strict \
              -ignore-missing-schemas \
              -kubernetes-version "${KUBERNETES_VERSION}" \
              -schema-location default \
              -summary \
              -output text < "$1"
          }

          echo "::group::chart default (default-off: zero search resources)"
          # Render with NO search override so this exercises the chart's own
          # default (search.enabled=false in values.yaml). If a later change
          # flips that default to true, this assertion fails — that is the
          # point: it guards the documented default-off contract, not a value
          # we hard-set here.
          helm template octo "${chart}" "${dummy_secrets[@]}" > "$tmp/off.yaml"
          validate "$tmp/off.yaml"
          off_hits=0
          for s in "${search_sources[@]}"; do
            n="$(count_source "${s}" "$tmp/off.yaml")"
            if [ "${n}" -ne 0 ]; then
              echo "::error::search template '${s}' rendered ${n} doc(s) with search.enabled=false"
              off_hits=$((off_hits + n))
            fi
          done
          if [ "${off_hits}" -ne 0 ]; then
            echo "::error::expected 0 search resources with search.enabled=false, found ${off_hits}"
            exit 1
          fi
          echo "OK: no search resources rendered when search.enabled=false"
          echo "::endgroup::"

          echo "::group::search.enabled=true (all five search templates render)"
          helm template octo "${chart}" "${dummy_secrets[@]}" \
            --set search.enabled=true > "$tmp/on.yaml"
          validate "$tmp/on.yaml"
          missing=0
          for s in "${search_sources[@]}"; do
            n="$(count_source "${s}" "$tmp/on.yaml")"
            if [ "${n}" -ge 1 ]; then
              echo "OK: ${s} rendered (${n} doc(s))"
            else
              echo "::error::search template '${s}' did NOT render with search.enabled=true"
              missing=$((missing + 1))
            fi
          done
          if [ "${missing}" -ne 0 ]; then
            echo "::error::expected all 5 search templates, ${missing} missing"
            exit 1
          fi
          echo "::endgroup::"

  validate-password:
    name: validate-password regression suite
    # Always runs — even on draft PRs. This is a fast pure-bash test (no infra
    # cost) and the CI Gate treats skipped upstream jobs as passing, so leaving
    # the draft guard here would hide missing regression evidence as green.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run password validation regression tests
        run: |
          set -euo pipefail
          bash tests/test-validate-password.sh

  ci-gate:
    name: CI Gate
    # Aggregate gate: always runs so the required status check ALWAYS reports.
    # The workflow now triggers on every PR to main (the old pull_request path
    # filter was removed because workflow-level path filtering prevents GitHub
    # from creating any check run, deadlocking required-status checks on PRs
    # that touch no yaml/kustomize files). Fails iff a needed job failed or was
    # cancelled; 'skipped'/'success' count as passing. Branch protection should
    # require ONLY the "CI Gate" context for this repo.
    if: ${{ always() }}
    needs: [yaml-lint, kustomize-validate, helm-validate, validate-password]
    runs-on: ubuntu-latest
    steps:
      - name: Verify upstream CI results
        env:
          RESULTS: ${{ join(needs.*.result, ',') }}
        run: |
          set -euo pipefail
          echo "needed job results: ${RESULTS}"
          IFS=',' read -ra items <<< "${RESULTS}"
          for r in "${items[@]}"; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "::error::CI Gate: a required job concluded '${r}'"
              exit 1
            fi
          done
          echo "CI Gate: all required jobs passed or were skipped"
