apiVersion: apps/v1
kind: Deployment
metadata:
  name: octo-smart-summary-worker

  labels:
    app: octo-smart-summary-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: octo-smart-summary-worker
  template:
    metadata:
      labels:
        app: octo-smart-summary-worker
    spec:
      containers:
        - name: octo-smart-summary-worker
          image: mininglamposs/octo-smart-summary-worker:latest
          imagePullPolicy: Always
          ports:
            - name: internal
              containerPort: 8082
          envFrom:
            - configMapRef:
                name: octo-smart-summary-config
          env:
            - name: MYSQL_DSN
              valueFrom:
                secretKeyRef:
                  name: octo-smart-summary-secret
                  key: MYSQL_DSN
            - name: IM_MYSQL_DSN
              valueFrom:
                secretKeyRef:
                  name: octo-smart-summary-secret
                  key: IM_MYSQL_DSN
            - name: LLM_API_URL
              valueFrom:
                secretKeyRef:
                  name: octo-smart-summary-secret
                  key: LLM_API_URL
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: octo-smart-summary-secret
                  key: LLM_API_KEY
          resources:
            requests:
              cpu: 1000m
              memory: 1Gi
            limits:
              cpu: 4000m
              memory: 4Gi
          livenessProbe:
            tcpSocket:
              port: 8082
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            tcpSocket:
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: octo-smart-summary-worker

  labels:
    app: octo-smart-summary-worker
spec:
  selector:
    app: octo-smart-summary-worker
  ports:
    - name: internal
      port: 8082
      targetPort: 8082
  type: ClusterIP
