# octo-smart-summary Secret template. Copy to `octo-smart-summary-secret.yaml` and fill in.
apiVersion: v1
kind: Secret
metadata:
  name: octo-smart-summary-secret
type: Opaque
stringData:
  MYSQL_DSN: "CHANGE_ME_MYSQL_DSN"               # smart-summary's own DB
  IM_MYSQL_DSN: "CHANGE_ME_IM_MYSQL_DSN"         # shared OCTO IM DB (read access)
  LLM_API_URL: "CHANGE_ME_LLM_API_URL"           # e.g. https://api.openai.com/v1
  LLM_API_KEY: "CHANGE_ME_LLM_API_KEY"
