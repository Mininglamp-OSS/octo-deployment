apiVersion: apps/v1
kind: Deployment
metadata:
  name: octo-web
  labels:
    app: octo-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: octo-web
  template:
    metadata:
      labels:
        app: octo-web
    spec:
      containers:
        - name: octo-web
          image: mininglamposs/octo-web:latest
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          env:
            - name: API_URL
              value: "http://octo-server"
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          readinessProbe:
            httpGet:
              path: /api/v1/common/appconfig
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/v1/common/appconfig
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2
              memory: 2Gi
      volumes:
        - name: nginx-conf
          configMap:
            name: octo-web-nginx
---
apiVersion: v1
kind: Service
metadata:
  name: octo-web
  labels:
    app: octo-web
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 80
  selector:
    app: octo-web
