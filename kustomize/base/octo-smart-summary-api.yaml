apiVersion: apps/v1
kind: Deployment
metadata:
  name: octo-smart-summary-api

  labels:
    app: octo-smart-summary-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: octo-smart-summary-api
  template:
    metadata:
      labels:
        app: octo-smart-summary-api
    spec:
      containers:
        - name: octo-smart-summary-api
          image: mininglamposs/octo-smart-summary-api:latest
          imagePullPolicy: Always
          ports:
            - name: public
              containerPort: 8080
            - name: internal
              containerPort: 8081
          envFrom:
            - configMapRef:
                name: octo-smart-summary-config
          env:
            - name: MYSQL_DSN
              valueFrom:
                secretKeyRef:
                  name: octo-smart-summary-secret
                  key: MYSQL_DSN
            - name: IM_MYSQL_DSN
              valueFrom:
                secretKeyRef:
                  name: octo-smart-summary-secret
                  key: IM_MYSQL_DSN
            - name: LLM_API_URL
              valueFrom:
                secretKeyRef:
                  name: octo-smart-summary-secret
                  key: LLM_API_URL
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: octo-smart-summary-secret
                  key: LLM_API_KEY
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: octo-smart-summary-api

  labels:
    app: octo-smart-summary-api
spec:
  selector:
    app: octo-smart-summary-api
  ports:
    - name: public
      port: 8080
      targetPort: 8080
    - name: internal
      port: 8081
      targetPort: 8081
  type: ClusterIP
