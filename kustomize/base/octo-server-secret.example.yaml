# octo-server Secret template.
# Copy to `octo-server-secret.yaml`, replace every CHANGE_ME_* with real values,
# then apply directly: `kubectl apply -n <ns> -f octo-server-secret.yaml`.
# Do NOT add the copied file to git — see ../../.gitignore.
apiVersion: v1
kind: Secret
metadata:
  name: octo-server-secret
type: Opaque
stringData:
  # ---- DB / cache ----
  DM_MYSQL_DSN: "CHANGE_ME_MYSQL_DSN"            # e.g. user:pass@tcp(host:3306)/im?charset=utf8mb4&parseTime=true&loc=Local
  DM_REDIS_ADDR: "CHANGE_ME_REDIS_ADDR"          # e.g. redis-svc:6379

  # ---- WukongIM admin ----
  WUKONGIM_MANAGER_TOKEN: "CHANGE_ME_WUKONGIM_MANAGER_TOKEN"

  # ---- Admin / system ----
  OCTO_ADMIN_PASSWORD: "CHANGE_ME_ADMIN_PASSWORD"
  DMWORK_MASTER_KEY: "CHANGE_ME_32B_HEX"
  OCTO_USER_API_KEY_SECRET: "CHANGE_ME_32B_HEX"
  NOTIFY_INTERNAL_TOKEN: "CHANGE_ME_64B_HEX"
  OCTO_INTERNAL_HMAC_SECRET: "CHANGE_ME_64B_HEX"
  OCTO_JWT_SECRET: "CHANGE_ME_64B_HEX"

  # ---- OIDC ----
  DM_OIDC_PROVIDER_CLIENT_ID: "CHANGE_ME_OIDC_CLIENT_ID"
  DM_OIDC_PROVIDER_CLIENT_SECRET: "CHANGE_ME_OIDC_CLIENT_SECRET"
  DM_OIDC_RT_ENC_KEY: "CHANGE_ME_BASE64_32B_KEY"

  # ---- Object storage (Tencent COS shown; switch as needed) ----
  COS_SECRET_ID: "CHANGE_ME_COS_AK"
  COS_SECRET_KEY: "CHANGE_ME_COS_SK"

  # ---- SMTP ----
  SUPPORT_EMAIL_PWD: "CHANGE_ME_SMTP_PASSWORD"

  # ---- APNS (iOS push) ----
  DM_PUSH_APNS_KEY_ID: "CHANGE_ME_APNS_KEY_ID"
  DM_PUSH_APNS_TEAM_ID: "CHANGE_ME_APPLE_TEAM_ID"
  # The .p8 file is mounted from a separate Secret (see octo-server.yaml volumeMounts).
  # Create it via:
  #   kubectl create secret generic octo-server-apns -n <ns> --from-file=AuthKey.p8=./AuthKey_XXXXXXXX.p8
