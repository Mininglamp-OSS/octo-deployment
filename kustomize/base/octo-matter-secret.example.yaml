# octo-matter Secret template. Copy to `octo-matter-secret.yaml` and fill in real values.
apiVersion: v1
kind: Secret
metadata:
  name: octo-matter-secret
type: Opaque
stringData:
  MYSQL_DSN: "CHANGE_ME_MYSQL_DSN"               # e.g. user:pass@tcp(host:3306)/octo_matter?charset=utf8mb4&parseTime=true
  LLM_API_KEY: "CHANGE_ME_LLM_API_KEY"
  # Must match octo-server-secret NOTIFY_INTERNAL_TOKEN — used for HMAC between services.
  NOTIFY_INTERNAL_TOKEN: "CHANGE_ME_64B_HEX"
