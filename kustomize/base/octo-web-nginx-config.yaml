apiVersion: v1
kind: ConfigMap
metadata:
  name: octo-web-nginx
data:
  default.conf: |-
    gzip on;
    gzip_min_length 1k;
    gzip_disable msie6;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 2;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    server {
        listen       80;
        server_name  localhost;
        server_tokens off;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' ws: wss: http: https: blob:; media-src 'self' blob:; worker-src 'self' blob:; object-src 'none'; frame-ancestors 'self';" always;

        resolver kube-dns.kube-system.svc.cluster.local valid=30s ipv6=off;
        resolver_timeout 5s;

        # Main API
        location /api/ {
            proxy_pass  ${API_URL}/;
            client_max_body_size 1000m;
            client_body_buffer_size 500m;
        }

        location = /version.json {
            root   /usr/share/nginx/html;
            add_header Cache-Control "no-store";
        }

        # OIDC SSO endpoints — backend mounts these under /v1/ directly,
        # so we forward /v1/* without strip/prepend.
        location /v1/ {
            proxy_pass  ${API_URL}/v1/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 10m;
        }

        # OCTO Matter (tasks / timeline)
        location /matter/ {
            proxy_pass  http://octo-matter/;
            client_max_body_size 10m;
        }

        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
            try_files $uri $uri/ /index.html;
        }
    }
