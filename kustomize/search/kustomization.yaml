# Search pipeline (Kafka + OpenSearch + es-indexer) — STANDALONE, OPT-IN.
#
# This kustomization is INTENTIONALLY NOT referenced by kustomize/base or any
# overlay (dev/prod). Applying the default base/overlays deploys ZERO search
# resources. An operator opts in explicitly and on a separate, owner-gated
# action, e.g.:
#
#   kubectl apply -k kustomize/search -n <ns>
#
# Everything here is additive: it adds new workloads, services, and PVCs and
# does not modify any core OCTO resource. See README.md in this directory.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - search-pvc.yaml
  - search-kafka.yaml
  - search-kafka-init.yaml
  - search-opensearch.yaml
  - es-indexer.yaml
  - searchetl-producer.yaml

images:
  - name: apache/kafka
    newTag: "3.8.0"
  # Build this locally with the analysis-ik plugin baked in (see
  # docker/opensearch/Dockerfile) and push to your registry, then point this
  # at it. The plugin version MUST match the OpenSearch version.
  - name: octo-search-opensearch-ik
    newTag: "2.17.0"
  # Shared by es-indexer AND searchetl-producer (one image, two binaries) —
  # this image-name override pins BOTH to the same image, which is correct: the
  # two binaries are built together and must stay in lockstep.
  #
  # Tencent TCR + digest pin (immutable, reproducible) — this is the registry
  # the dmwork-test (xiaotiao-tke) cluster actually pulls from, NOT Docker Hub.
  # The es-indexer already running there is pinned by digest the same way, so
  # both binaries resolve to the same byte-identical build. The digest below is
  # the image built from octo-search-indexer origin/main 94864fc (git tag
  # v0.1.0); the registry also carries the human-readable :v0.1.0 / :94864fc
  # tags pointing at this same digest.
  # NOTE: applying this directory will also bounce any already-running
  # es-indexer onto this digest (see README "apply knock-on").
  - name: mininglamposs/octo-search-indexer
    newName: tbj7-xtiao-tcr1.tencentcloudcr.com/xtiao-release/dmwork/octo-search-indexer
    digest: sha256:97c781154e1c9588deab7af29d6b7cb041188a072621122821391ac90272c7a0
