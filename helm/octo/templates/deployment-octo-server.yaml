apiVersion: v1
kind: Service
metadata:
  name: {{ include "octo.server.fullname" . }}
  labels:
    {{- include "octo.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8090
      targetPort: http
    - name: grpc
      port: 6979
      targetPort: grpc
  selector:
    {{- include "octo.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: server
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "octo.server.fullname" . }}
  labels:
    {{- include "octo.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  replicas: {{ .Values.server.replicas | default 1 }}
  selector:
    matchLabels:
      {{- include "octo.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: server
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap-octo-server.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- if .Values.minio.enabled }}
        checksum/misc: {{ include (print $.Template.BasePath "/configmap-misc.yaml") . | sha256sum }}
        {{- end }}
      labels:
        {{- include "octo.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: server
    spec:
      {{- include "octo.imagePullSecrets" . | nindent 6 }}
      initContainers:
        - name: wait-for-mysql
          image: {{ include "octo.image" (dict "repo" .Values.busybox.image.repository "tag" .Values.busybox.image.tag "ctx" .) }}
          command: ['sh', '-c', 'until nc -z {{ include "octo.mysql.host" . }} {{ include "octo.mysql.port" . }}; do echo waiting for mysql; sleep 2; done']
        - name: wait-for-redis
          image: {{ include "octo.image" (dict "repo" .Values.busybox.image.repository "tag" .Values.busybox.image.tag "ctx" .) }}
          command: ['sh', '-c', 'until nc -z {{ include "octo.redis.host" . }} {{ include "octo.redis.port" . }}; do echo waiting for redis; sleep 2; done']
        {{- if not (include "octo.isCloudStorage" .) }}
        - name: wait-for-minio
          image: {{ include "octo.image" (dict "repo" .Values.busybox.image.repository "tag" .Values.busybox.image.tag "ctx" .) }}
          command: ['sh', '-c', 'until wget -q -O- http://{{ include "octo.minio.endpoint" . }}/minio/health/live >/dev/null 2>&1; do echo waiting for minio; sleep 2; done']
        {{- end }}
        {{- if .Values.minio.enabled }}
        - name: minio-bootstrap
          image: {{ include "octo.image" (dict "repo" .Values.minio.mcImage.repository "tag" .Values.minio.mcImage.tag "ctx" .) }}
          imagePullPolicy: {{ .Values.minio.mcImage.pullPolicy }}
          env:
            - name: MINIO_ROOT_USER
              value: {{ .Values.minio.auth.rootUser | default "octoadmin" | quote }}
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "octo.secretName" . }}
                  key: MINIO_ROOT_PASSWORD
            - name: OCTO_MINIO_APP_USER
              value: {{ include "octo.minio.appUser" . | quote }}
            - name: OCTO_MINIO_APP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "octo.secretName" . }}
                  key: OCTO_MINIO_APP_PASSWORD
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              MINIO_ENDPOINT="http://{{ include "octo.minio.endpoint" . }}"

              root_lc=$(printf %s "${MINIO_ROOT_PASSWORD:-}" | tr 'A-Z' 'a-z')
              case "$root_lc" in
                ""|change_me_*|chg_me*)
                  echo "[minio-bootstrap] FATAL: MINIO_ROOT_PASSWORD is empty or a placeholder." >&2; exit 1 ;;
              esac
              app_lc=$(printf %s "${OCTO_MINIO_APP_PASSWORD:-}" | tr 'A-Z' 'a-z')
              case "$app_lc" in
                ""|change_me_*|chg_me*)
                  echo "[minio-bootstrap] FATAL: OCTO_MINIO_APP_PASSWORD is empty or a placeholder." >&2; exit 1 ;;
              esac

              echo "[minio-bootstrap] setting alias..."
              until mc alias set local "$MINIO_ENDPOINT" "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD" >/dev/null 2>&1; do
                sleep 2
              done

              echo "[minio-bootstrap] ensuring app user $OCTO_MINIO_APP_USER..."
              # `mc admin user add` is idempotent on mc >= RELEASE.2024-10-02:
              # creates the user on first run, updates the password on re-runs.
              # No `|| true` needed — real failures (auth, network) will now
              # surface via `set -eu` instead of being silently swallowed.
              mc admin user add local "$OCTO_MINIO_APP_USER" "$OCTO_MINIO_APP_PASSWORD" >/dev/null 2>&1

              echo "[minio-bootstrap] (re)installing octo-app policy..."
              # `mc admin policy create` maps to PUT /minio/admin/v3/add-canned-policy
              # on the MinIO server. The server handler calls SetPolicy() unconditionally
              # (create-or-replace), so running this on an existing policy silently
              # replaces it and returns HTTP 200. Verified against the pinned server
              # image minio/minio:RELEASE.2025-04-22T22-12-26Z source:
              # cmd/admin-handlers-users.go L1744: globalIAMSys.SetPolicy(ctx, ...)
              # The old `create || update` pattern (used in docker-compose) was a
              # workaround for an era when `mc admin policy update` existed as a
              # separate command; that subcommand no longer exists in current mc.
              mc admin policy create local octo-app /etc/minio/octo-app-policy.json >/dev/null 2>&1

              echo "[minio-bootstrap] attaching policy to $OCTO_MINIO_APP_USER..."
              mc admin policy attach local octo-app --user "$OCTO_MINIO_APP_USER" 2>/dev/null || true

              for b in file chat moment sticker report chatbg common download group avatar; do
                mc mb --ignore-existing "local/$b" >/dev/null
              done

              echo "[minio-bootstrap] setting anonymous download on content buckets..."
              for b in chat file moment sticker chatbg common avatar; do
                attempt=1
                until mc anonymous set download "local/$b" >/dev/null 2>&1; do
                  if [ "$attempt" -ge 3 ]; then
                    echo "[minio-bootstrap] FATAL: mc anonymous set download local/$b failed after 3 attempts" >&2; exit 1
                  fi
                  attempt=$((attempt + 1)); sleep 2
                done
                json=$(mc anonymous get --json "local/$b" 2>/dev/null)
                case "$json" in
                  *'"permission":"download"'*) ;;
                  *) echo "[minio-bootstrap] FATAL: anonymous policy on local/$b verify failed: $json" >&2; exit 1 ;;
                esac
              done

              echo "[minio-bootstrap] done"
          volumeMounts:
            - name: minio-policy
              mountPath: /etc/minio/octo-app-policy.json
              subPath: minio-octo-app-policy.json
        {{- end }}
      containers:
        - name: octo-server
          image: {{ include "octo.image" (dict "repo" .Values.server.image.repository "tag" .Values.server.image.tag "ctx" .) }}
          imagePullPolicy: {{ .Values.server.image.pullPolicy }}
          args: ["api"]
          ports:
            - name: http
              containerPort: 8090
            - name: grpc
              containerPort: 6979
          env:
            - name: TZ
              value: {{ .Values.timezone | default "UTC" | quote }}
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "octo.secretName" . }}
                  key: MYSQL_ROOT_PASSWORD
            - name: OCTO_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "octo.secretName" . }}
                  key: OCTO_MASTER_KEY
            - name: DMWORK_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "octo.secretName" . }}
                  key: OCTO_MASTER_KEY
            {{- if not (include "octo.isCloudStorage" .) }}
            - name: OCTO_MINIO_APP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "octo.secretName" . }}
                  key: OCTO_MINIO_APP_PASSWORD
            {{- else }}
            {{- $fs := (.Values.server.config | default dict).fileService | default "minio" }}
            {{- if eq $fs "tencentCOS" }}
            - name: COS_REGION
              value: {{ .Values.cos.region | quote }}
            - name: COS_BUCKET
              value: {{ .Values.cos.bucket | quote }}
            - name: COS_SECRET_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "octo.secretName" . }}
                  key: COS_SECRET_ID
            - name: COS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "octo.secretName" . }}
                  key: COS_SECRET_KEY
            {{- else if eq $fs "aliOSS" }}
            - name: OSS_ENDPOINT
              value: {{ .Values.oss.endpoint | quote }}
            - name: OSS_BUCKET
              value: {{ .Values.oss.bucket | quote }}
            - name: OSS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "octo.secretName" . }}
                  key: OSS_ACCESS_KEY_ID
            - name: OSS_ACCESS_KEY_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "octo.secretName" . }}
                  key: OSS_ACCESS_KEY_SECRET
            {{- else if eq $fs "s3" }}
            - name: S3_ENDPOINT
              value: {{ .Values.s3.endpoint | quote }}
            - name: S3_BUCKET
              value: {{ .Values.s3.bucket | quote }}
            - name: S3_REGION
              value: {{ .Values.s3.region | quote }}
            - name: S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "octo.secretName" . }}
                  key: S3_ACCESS_KEY_ID
            - name: S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "octo.secretName" . }}
                  key: S3_SECRET_ACCESS_KEY
            {{- if .Values.secrets.s3SessionToken }}
            - name: S3_SESSION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "octo.secretName" . }}
                  key: S3_SESSION_TOKEN
            {{- end }}
            {{- else if eq $fs "qiniu" }}
            - name: QINIU_BUCKET
              value: {{ .Values.qiniu.bucket | quote }}
            - name: QINIU_DOMAIN
              value: {{ .Values.qiniu.downloadURL | quote }}
            - name: QINIU_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "octo.secretName" . }}
                  key: QINIU_ACCESS_KEY
            - name: QINIU_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "octo.secretName" . }}
                  key: QINIU_SECRET_KEY
            {{- end }}
            {{- end }}
            - name: FILE_SERVICE
              value: {{ (.Values.server.config | default dict).fileService | default "minio" | quote }}
            - name: OCTO_WUKONGIM_MANAGER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "octo.secretName" . }}
                  key: OCTO_WUKONGIM_MANAGER_TOKEN
            - name: OCTO_NOTIFY_INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "octo.secretName" . }}
                  key: OCTO_NOTIFY_INTERNAL_TOKEN
            - name: OCTO_ADMIN_PWD
              valueFrom:
                secretKeyRef:
                  name: {{ include "octo.secretName" . }}
                  key: OCTO_ADMIN_PWD
            - name: OCTO_WEBHOOK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "octo.secretName" . }}
                  key: OCTO_WEBHOOK_SECRET_KEY
            # DSN built from secret ref via K8s $(VAR) interpolation
            - name: TS_DB_MYSQLADDR
              value: "root:$(MYSQL_ROOT_PASSWORD)@tcp({{ include "octo.mysql.host" . }}:{{ include "octo.mysql.port" . }})/{{ include "octo.mysql.database" . }}?charset=utf8mb4&parseTime=true&loc=Local"
            - name: DM_MYSQL_DSN
              value: "root:$(MYSQL_ROOT_PASSWORD)@tcp({{ include "octo.mysql.host" . }}:{{ include "octo.mysql.port" . }})/{{ include "octo.mysql.database" . }}?charset=utf8mb4&parseTime=true&loc=Local"
            - name: TS_DB_REDISADDR
              value: {{ include "octo.redis.addr" . | quote }}
            - name: DM_REDIS_ADDR
              value: {{ include "octo.redis.addr" . | quote }}
            {{- if .Values.secrets.redisPassword }}
            - name: TS_DB_REDISPASS
              valueFrom:
                secretKeyRef:
                  name: {{ include "octo.secretName" . }}
                  key: REDIS_PASSWORD
            {{- end }}
            - name: TS_WUKONGIM_MANAGERTOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "octo.secretName" . }}
                  key: OCTO_WUKONGIM_MANAGER_TOKEN
            - name: WUKONGIM_MANAGER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "octo.secretName" . }}
                  key: OCTO_WUKONGIM_MANAGER_TOKEN
            {{- if not (include "octo.isCloudStorage" .) }}
            - name: TS_MINIO_ACCESSKEYID
              value: {{ include "octo.minio.appUser" . | quote }}
            - name: TS_MINIO_SECRETACCESSKEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "octo.secretName" . }}
                  key: OCTO_MINIO_APP_PASSWORD
            {{- end }}
            - name: TS_MINIO_DOWNLOADURL
              value: {{ include "octo.minio.serverURL" . | quote }}
            - name: TS_EXTERNAL_BASEURL
              value: {{ include "octo.externalBaseURL" . | quote }}
            {{- if .Values.wukongim.externalIP }}
            - name: TS_EXTERNAL_IP
              value: {{ .Values.wukongim.externalIP | quote }}
            {{- end }}
            - name: NOTIFY_INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "octo.secretName" . }}
                  key: OCTO_NOTIFY_INTERNAL_TOKEN
            - name: TS_ADMINPWD
              valueFrom:
                secretKeyRef:
                  name: {{ include "octo.secretName" . }}
                  key: OCTO_ADMIN_PWD
            - name: TS_WEBHOOK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "octo.secretName" . }}
                  key: OCTO_WEBHOOK_SECRET_KEY
            {{- if .Values.server.config.support.emailPwd }}
            - name: TS_SUPPORT_EMAILPWD
              valueFrom:
                secretKeyRef:
                  name: {{ include "octo.secretName" . }}
                  key: TS_SUPPORT_EMAILPWD
            {{- end }}
          readinessProbe:
            httpGet:
              path: /v1/ping
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /v1/ping
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: config
              mountPath: /home/configs/tsdd.yaml
              subPath: tsdd.yaml
            - name: logs
              mountPath: /home/logs
          {{- with .Values.server.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "octo.fullname" . }}-octo-server-config
        - name: logs
          emptyDir: {}
        {{- if .Values.minio.enabled }}
        - name: minio-policy
          configMap:
            name: {{ include "octo.fullname" . }}-misc
        {{- end }}
