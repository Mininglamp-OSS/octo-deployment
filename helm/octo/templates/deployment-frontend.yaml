# yamllint disable
apiVersion: v1
kind: Service
metadata:
  name: {{ include "octo.web.fullname" . }}
  labels:
    {{- include "octo.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
  selector:
    {{- include "octo.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: web
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "octo.web.fullname" . }}
  labels:
    {{- include "octo.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.web.replicas | default 1 }}
  selector:
    matchLabels:
      {{- include "octo.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        {{- include "octo.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: web
    spec:
      {{- include "octo.imagePullSecrets" . | nindent 6 }}
      initContainers:
        - name: wait-for-server
          image: {{ include "octo.image" (dict "repo" .Values.busybox.image.repository "tag" .Values.busybox.image.tag "ctx" .) }}
          command: ['sh', '-c', 'until wget -q -O- http://{{ include "octo.server.fullname" . }}:8090/v1/ping >/dev/null 2>&1; do echo waiting for octo-server; sleep 5; done']
      containers:
        - name: octo-web
          image: {{ include "octo.image" (dict "repo" .Values.web.image.repository "tag" .Values.web.image.tag "ctx" .) }}
          imagePullPolicy: {{ .Values.web.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
          env:
            - name: API_URL
              value: "http://{{ include "octo.server.fullname" . }}:8090"
            {{- if .Values.summary.enabled }}
            - name: SUMMARY_API_URL
              value: "http://{{ include "octo.summaryApi.fullname" . }}:8080"
            {{- end }}
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          {{- with .Values.web.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "octo.admin.fullname" . }}
  labels:
    {{- include "octo.labels" . | nindent 4 }}
    app.kubernetes.io/component: admin
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
  selector:
    {{- include "octo.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: admin
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "octo.admin.fullname" . }}
  labels:
    {{- include "octo.labels" . | nindent 4 }}
    app.kubernetes.io/component: admin
spec:
  replicas: {{ .Values.admin.replicas | default 1 }}
  selector:
    matchLabels:
      {{- include "octo.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: admin
  template:
    metadata:
      labels:
        {{- include "octo.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: admin
    spec:
      {{- include "octo.imagePullSecrets" . | nindent 6 }}
      initContainers:
        - name: wait-for-server
          image: {{ include "octo.image" (dict "repo" .Values.busybox.image.repository "tag" .Values.busybox.image.tag "ctx" .) }}
          command: ['sh', '-c', 'until wget -q -O- http://{{ include "octo.server.fullname" . }}:8090/v1/ping >/dev/null 2>&1; do echo waiting for octo-server; sleep 5; done']
      containers:
        - name: octo-admin
          image: {{ include "octo.image" (dict "repo" .Values.admin.image.repository "tag" .Values.admin.image.tag "ctx" .) }}
          imagePullPolicy: {{ .Values.admin.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
          env:
            - name: API_BACKEND
              value: "{{ include "octo.server.fullname" . }}:8090"
          readinessProbe:
            httpGet:
              path: /admin/
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /admin/
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          {{- with .Values.admin.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
