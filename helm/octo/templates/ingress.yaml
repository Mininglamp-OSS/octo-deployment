{{- if .Values.ingress.enabled }}
{{- $host := .Values.ingress.host | default .Values.domain }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "octo.fullname" . }}
  labels:
    {{- include "octo.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className | quote }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ $host | quote }}
      secretName: {{ include "octo.ingress.tlsSecretName" . | quote }}
  {{- end }}
  rules:
    - host: {{ $host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "octo.nginx.fullname" . }}
                port:
                  number: {{ .Values.nginx.service.port | default 80 }}
{{- end }}
