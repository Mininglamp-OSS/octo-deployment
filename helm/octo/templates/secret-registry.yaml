{{- if .Values.tcrImageCredentials.registry }}
apiVersion: v1
kind: Secret
metadata:
  name: tcr-registry-key
  annotations:
    "helm.sh/hook": "pre-install,pre-upgrade"
    "helm.sh/hook-weight": "-5"
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ template "octo.tcrImagePullSecret" . }}
{{- end }}

