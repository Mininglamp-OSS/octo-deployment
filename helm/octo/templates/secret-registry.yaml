{{- if and .Values.global.imagePullSecrets .Values.tcrImageCredentials.registry }}
apiVersion: v1
kind: Secret
metadata:
  name: tcr-registry-key
  annotations:
    "helm.sh/hook": "pre-install,pre-upgrade"
    "helm.sh/hook-weight": "-5"
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ template "octo.tcrImagePullSecret" . }}
{{- end }}

{{- define "octo.tcrImagePullSecret" }}
{{- with .Values.tcrImageCredentials }}
{{- printf "{\"auths\":{\"%s\":{\"username\":\"%s\",\"password\":\"%s\",\"auth\":\"%s\"}}}" .registry .username .password (printf "%s:%s" .username .password | b64enc) | b64enc }}
{{- end }}
{{- end }}
