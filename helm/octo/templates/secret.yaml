{{/*
Central secret for all OCTO credentials.
Helm `required` prevents installation when critical values are empty.
*/}}
{{- $fs := (.Values.server.config | default dict).fileService | default "minio" }}
{{- $validFS := list "minio" "tencentCOS" "aliyunOSS" "awsS3" "qiniu" }}
{{- if not (has $fs $validFS) }}
{{- fail (printf "server.config.fileService '%s' is invalid; must be one of: minio, tencentCOS, aliyunOSS, awsS3, qiniu" $fs) }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "octo.secretName" . }}
  labels:
    {{- include "octo.labels" . | nindent 4 }}
type: Opaque
data:
  MYSQL_ROOT_PASSWORD:          {{ required "secrets.mysqlRootPassword must be set" .Values.secrets.mysqlRootPassword | b64enc }}
  {{- if include "octo.minio.active" . }}
  MINIO_ROOT_PASSWORD:          {{ required "secrets.minioRootPassword must be set (min 8 chars) when minio.enabled=true" .Values.secrets.minioRootPassword | b64enc }}
  {{- end }}
  {{- if not (include "octo.isCloudStorage" .) }}
  OCTO_MINIO_APP_PASSWORD:      {{ required "secrets.minioAppPassword must be set" .Values.secrets.minioAppPassword | b64enc }}
  {{- end }}
  OCTO_MATTER_DB_PASSWORD:      {{ required "secrets.matterDbPassword must be set" .Values.secrets.matterDbPassword | b64enc }}
  OCTO_SUMMARY_DB_PASSWORD:     {{ required "secrets.summaryDbPassword must be set" .Values.secrets.summaryDbPassword | b64enc }}
  OCTO_SUMMARY_READER_PASSWORD: {{ required "secrets.summaryReaderPassword must be set" .Values.secrets.summaryReaderPassword | b64enc }}
  OCTO_MASTER_KEY:              {{ required "secrets.octoMasterKey must be set (32 bytes)" .Values.secrets.octoMasterKey | b64enc }}
  OCTO_NOTIFY_INTERNAL_TOKEN:   {{ required "secrets.notifyInternalToken must be set" .Values.secrets.notifyInternalToken | b64enc }}
  OCTO_WUKONGIM_MANAGER_TOKEN:  {{ required "secrets.wukongimManagerToken must be set" .Values.secrets.wukongimManagerToken | b64enc }}
  OCTO_ADMIN_PWD:               {{ .Values.secrets.adminPwd | default "" | b64enc }}
  LLM_API_KEY:                  {{ .Values.secrets.llmApiKey | default "" | b64enc }}
  OCTO_WEBHOOK_SECRET_KEY:      {{ .Values.secrets.webhookSecretKey | default "" | b64enc }}
  {{- if .Values.secrets.redisPassword }}
  REDIS_PASSWORD:               {{ .Values.secrets.redisPassword | b64enc }}
  {{- end }}
  {{- if .Values.server.config.support.emailPwd }}
  TS_SUPPORT_EMAILPWD:          {{ .Values.server.config.support.emailPwd | b64enc }}
  {{- end }}
  {{- if eq $fs "tencentCOS" }}
  COS_SECRET_ID:                {{ required "secrets.cosSecretId must be set when fileService=tencentCOS" .Values.secrets.cosSecretId | b64enc }}
  COS_SECRET_KEY:               {{ required "secrets.cosSecretKey must be set when fileService=tencentCOS" .Values.secrets.cosSecretKey | b64enc }}
  {{- else if eq $fs "aliyunOSS" }}
  OSS_ACCESS_KEY_ID:            {{ required "secrets.ossAccessKeyId must be set when fileService=aliyunOSS" .Values.secrets.ossAccessKeyId | b64enc }}
  OSS_ACCESS_KEY_SECRET:        {{ required "secrets.ossAccessKeySecret must be set when fileService=aliyunOSS" .Values.secrets.ossAccessKeySecret | b64enc }}
  {{- else if eq $fs "awsS3" }}
  S3_ACCESS_KEY_ID:             {{ required "secrets.s3AccessKeyId must be set when fileService=awsS3" .Values.secrets.s3AccessKeyId | b64enc }}
  S3_SECRET_ACCESS_KEY:         {{ required "secrets.s3SecretAccessKey must be set when fileService=awsS3" .Values.secrets.s3SecretAccessKey | b64enc }}
  {{- if .Values.secrets.s3SessionToken }}
  S3_SESSION_TOKEN:             {{ .Values.secrets.s3SessionToken | b64enc }}
  {{- end }}
  {{- else if eq $fs "qiniu" }}
  QINIU_ACCESS_KEY:             {{ required "secrets.qiniuAccessKey must be set when fileService=qiniu" .Values.secrets.qiniuAccessKey | b64enc }}
  QINIU_SECRET_KEY:             {{ required "secrets.qiniuSecretKey must be set when fileService=qiniu" .Values.secrets.qiniuSecretKey | b64enc }}
  {{- end }}
