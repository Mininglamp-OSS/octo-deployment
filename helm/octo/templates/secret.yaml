{{/*
Central secret for all OCTO credentials.
Helm `required` prevents installation when critical values are empty.
*/}}
{{- $fs := (.Values.server.config | default dict).fileService | default "minio" }}
{{- $validFS := list "minio" "tencentCOS" "aliyunOSS" "awsS3" "qiniu" }}
{{- if not (has $fs $validFS) }}
{{- fail (printf "server.config.fileService '%s' is invalid; must be one of: minio, tencentCOS, aliyunOSS, awsS3, qiniu" $fs) }}
{{- end }}
{{- if and (ne $fs "minio") .Values.minio.enabled }}
{{- fail "minio.enabled must be false when server.config.fileService is not 'minio'" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "octo.secretName" . }}
  labels:
    {{- include "octo.labels" . | nindent 4 }}
type: Opaque
data:
  MYSQL_ROOT_PASSWORD:          {{ required "secrets.mysqlRootPassword must be set" .Values.secrets.mysqlRootPassword | b64enc | quote }}
  {{- if include "octo.minio.active" . }}
  MINIO_ROOT_PASSWORD:          {{ required "secrets.minioRootPassword must be set (min 8 chars) when minio.enabled=true" .Values.secrets.minioRootPassword | b64enc | quote }}
  {{- end }}
  {{- if not (include "octo.isCloudStorage" .) }}
  OCTO_MINIO_APP_PASSWORD:      {{ required "secrets.minioAppPassword must be set" .Values.secrets.minioAppPassword | b64enc | quote }}
  {{- end }}
  OCTO_MATTER_DB_PASSWORD:      {{ required "secrets.matterDbPassword must be set" .Values.secrets.matterDbPassword | b64enc | quote }}
  OCTO_SUMMARY_DB_PASSWORD:     {{ required "secrets.summaryDbPassword must be set" .Values.secrets.summaryDbPassword | b64enc | quote }}
  OCTO_SUMMARY_READER_PASSWORD: {{ required "secrets.summaryReaderPassword must be set" .Values.secrets.summaryReaderPassword | b64enc | quote }}
  OCTO_MASTER_KEY:              {{ required "secrets.octoMasterKey must be set (32 bytes)" .Values.secrets.octoMasterKey | b64enc | quote }}
  OCTO_NOTIFY_INTERNAL_TOKEN:   {{ required "secrets.notifyInternalToken must be set" .Values.secrets.notifyInternalToken | b64enc | quote }}
  OCTO_WUKONGIM_MANAGER_TOKEN:  {{ required "secrets.wukongimManagerToken must be set" .Values.secrets.wukongimManagerToken | b64enc | quote }}
  OCTO_ADMIN_PWD:               {{ .Values.secrets.adminPwd | default "" | b64enc | quote }}
  LLM_API_KEY:                  {{ .Values.secrets.llmApiKey | default "" | b64enc | quote }}
  OCTO_WEBHOOK_SECRET_KEY:      {{ .Values.secrets.webhookSecretKey | default "" | b64enc | quote }}
  {{- if .Values.speech.enabled }}
  SPEECH_DB_PASSWORD:           {{ required "secrets.speechDbPassword must be set when speech.enabled=true" .Values.secrets.speechDbPassword | b64enc | quote }}
  # Placeholder is replaced by the Octo Server bootstrap initContainer after
  # creating an App through Speech Admin.
  SPEECH_API_KEY:               {{ required "secrets.speechApiKey must be set when speech.enabled=true" .Values.secrets.speechApiKey | b64enc | quote }}
  SPEECH_API_KEY_READY:         {{ "false" | b64enc | quote }}
  {{- if eq .Values.speech.config.engine "qwen" }}
  VOICE_QWEN_KEY:               {{ required "secrets.speechModelKey must be set when speech.config.engine=qwen" (.Values.secrets.speechModelKey | default .Values.secrets.speechQwenKey) | b64enc | quote }}
  {{- else }}
  VOICE_LITELLM_KEY:            {{ required "secrets.speechModelKey must be set when speech.config.engine=gemini or gpt" (.Values.secrets.speechModelKey | default .Values.secrets.speechLiteLLMKey) | b64enc | quote }}
  {{- end }}
  SPEECH_ADMIN_USERNAME:        {{ required "secrets.speechAdminUsername must be set when speech.enabled=true" .Values.secrets.speechAdminUsername | b64enc | quote }}
  SPEECH_ADMIN_PASSWORD:        {{ required "secrets.speechAdminPassword must be set when speech.enabled=true" .Values.secrets.speechAdminPassword | b64enc | quote }}
  SPEECH_ADMIN_JWT_SECRET:      {{ required "secrets.speechAdminJwtSecret must be set when speech.enabled=true" .Values.secrets.speechAdminJwtSecret | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.redisPassword }}
  REDIS_PASSWORD:               {{ .Values.secrets.redisPassword | b64enc | quote }}
  {{- end }}
  {{- if .Values.server.config.support.emailPwd }}
  TS_SUPPORT_EMAILPWD:          {{ .Values.server.config.support.emailPwd | b64enc | quote }}
  {{- end }}
  {{- if eq $fs "tencentCOS" }}
  COS_SECRET_ID:                {{ required "secrets.cosSecretId must be set when fileService=tencentCOS" .Values.secrets.cosSecretId | b64enc | quote }}
  COS_SECRET_KEY:               {{ required "secrets.cosSecretKey must be set when fileService=tencentCOS" .Values.secrets.cosSecretKey | b64enc | quote }}
  {{- else if eq $fs "aliyunOSS" }}
  OSS_ACCESS_KEY_ID:            {{ required "secrets.ossAccessKeyId must be set when fileService=aliyunOSS" .Values.secrets.ossAccessKeyId | b64enc | quote }}
  OSS_ACCESS_KEY_SECRET:        {{ required "secrets.ossAccessKeySecret must be set when fileService=aliyunOSS" .Values.secrets.ossAccessKeySecret | b64enc | quote }}
  {{- else if eq $fs "awsS3" }}
  S3_ACCESS_KEY_ID:             {{ required "secrets.s3AccessKeyId must be set when fileService=awsS3" .Values.secrets.s3AccessKeyId | b64enc | quote }}
  S3_SECRET_ACCESS_KEY:         {{ required "secrets.s3SecretAccessKey must be set when fileService=awsS3" .Values.secrets.s3SecretAccessKey | b64enc | quote }}
  {{- if .Values.secrets.s3SessionToken }}
  S3_SESSION_TOKEN:             {{ .Values.secrets.s3SessionToken | b64enc | quote }}
  {{- end }}
  {{- else if eq $fs "qiniu" }}
  QINIU_ACCESS_KEY:             {{ required "secrets.qiniuAccessKey must be set when fileService=qiniu" .Values.secrets.qiniuAccessKey | b64enc | quote }}
  QINIU_SECRET_KEY:             {{ required "secrets.qiniuSecretKey must be set when fileService=qiniu" .Values.secrets.qiniuSecretKey | b64enc | quote }}
  {{- end }}
