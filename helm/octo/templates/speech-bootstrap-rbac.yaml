{{- if .Values.speech.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "octo.speechBootstrap" . }}
  labels:
    {{- include "octo.labels" . | nindent 4 }}
    app.kubernetes.io/component: speech-bootstrap
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "octo.speechBootstrap" . }}
  labels:
    {{- include "octo.labels" . | nindent 4 }}
    app.kubernetes.io/component: speech-bootstrap
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: [{{ include "octo.secretName" . | quote }}]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "octo.speechBootstrap" . }}
  labels:
    {{- include "octo.labels" . | nindent 4 }}
    app.kubernetes.io/component: speech-bootstrap
subjects:
  - kind: ServiceAccount
    name: {{ include "octo.speechBootstrap" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "octo.speechBootstrap" . }}
{{- end }}
